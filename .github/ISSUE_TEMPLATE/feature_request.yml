name: Feature request
description: Suggest an improvement or new capability
title: "[Request]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for the idea! A couple of lines is enough.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: The use case or pain point behind the request.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What you'd like it to do (rough is fine).
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Anything you already tried or thought about.
