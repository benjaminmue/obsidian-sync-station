# Local development / testing. On Unraid this is expressed as a CA template (XML)
# instead — added in a later milestone.
services:
  obsidian-sync-station:
    build: .
    image: obsidian-sync-station:local
    container_name: obsidian-sync-station
    ports:
      - "8080:8080"
    environment:
      - BACKUP=false
      - WEBUI_PORT=8080
      - DEVICE_NAME=unraid-sync-station
    volumes:
      - ./data/config:/config
      - ./data/vault:/vault
      # - ./data/backup:/backup   # only when BACKUP=true
    restart: unless-stopped
